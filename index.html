        h1.main-title { color: #f1c40f; font-size: 2.5rem; margin-bottom: 20px; }
        #searchBar { width: 100%; max-width: 500px; padding: 12px 20px; border-radius: 50px; border: 2px solid #f1c40f; background: #1a1a1a; color: white; outline: none; text-align: right; box-sizing: border-box; margin-bottom: 40px; }

</head>
<body>

    <h1 class="main-title">RA KURD . IPA</h1>

    <script>
        function searchApps() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let apps = document.getElementsByClassName('app-item');
            for (let i = 0; i < apps.length; i++) {
                let title = apps[i].getElementsByTagName('h2')[0].innerText.toLowerCase();
                apps[i].style.display = title.includes(input) ? "flex" : "none";
            }
        }
